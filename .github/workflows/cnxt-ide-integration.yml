name: cNxt IDE Integration

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - cnxt/main
    paths:
      - "cnxt/**"
      - ".github/workflows/cnxt-ide-integration.yml"
  pull_request:
    paths:
      - "cnxt/**"
      - ".github/workflows/cnxt-ide-integration.yml"

jobs:
  cnxt-ide-tests:
    name: cNxt IDE tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11"]
    steps:
      - name: Fetch LLVM sources
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run cNxt IDE toolchain tests
        run: |
          python -m unittest cnxt/tools/tests/test_cnxt_format.py -v
          python -m unittest cnxt/tools/tests/test_cnxt_lint.py -v
          python -m unittest cnxt/tools/tests/test_e2e_ide_workflows.py -v
